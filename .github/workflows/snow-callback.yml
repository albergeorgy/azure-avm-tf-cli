# .github/workflows/snow-callback.yml
# Notifies ServiceNow when a Terraform deployment completes
name: ServiceNow Callback

on:
  workflow_run:
    workflows: ["Terraform Apply"]
    types: [completed]

jobs:
  callback:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Extract SNOW RITM from linked Issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              labels: 'snow-request',
              per_page: 10,
              sort: 'created',
              direction: 'desc'
            });

            for (const issue of issues.data) {
              const ritmMatch = issue.body.match(/\*\*RITM:\*\*\s*(RITM\d+)/);
              const sysIdMatch = issue.body.match(/\*\*sys_id:\*\*\s*([a-f0-9]{32})/);
              if (ritmMatch && sysIdMatch) {
                core.setOutput('ritm', ritmMatch[1]);
                core.setOutput('sys_id', sysIdMatch[1]);
                core.setOutput('issue_number', issue.number.toString());
                core.setOutput('found', 'true');
                console.log(`Found RITM: ${ritmMatch[1]}, sys_id: ${sysIdMatch[1]}`);
                return;
              }
            }
            core.setOutput('found', 'false');
            console.log('No SNOW RITM found in recent issues');

      - name: Update ServiceNow RITM
        if: steps.extract.outputs.found == 'true'
        env:
          SNOW_INSTANCE: ${{ secrets.SNOW_INSTANCE }}
          SNOW_TOKEN: ${{ secrets.SNOW_TOKEN }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RITM: ${{ steps.extract.outputs.ritm }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          if [ "$CONCLUSION" == "success" ]; then
            STATE="3"
            COMMENT="✅ Azure resources deployed successfully via GitHub Copilot + Terraform. Run: ${RUN_URL}"
          else
            STATE="4"
            COMMENT="❌ Deployment failed. See GitHub Actions for details: ${RUN_URL}"
          fi

          echo "Updating RITM ${RITM} → state=${STATE}"

          curl -sf -X PATCH \
            "https://${SNOW_INSTANCE}.service-now.com/api/now/table/sc_req_item/${{ steps.extract.outputs.sys_id }}" \
            -H "Authorization: Bearer ${SNOW_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"state\":\"${STATE}\",\"comments\":\"${COMMENT}\"}"

      - name: Close GitHub Issue on success
        if: >
          steps.extract.outputs.found == 'true' &&
          github.event.workflow_run.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.extract.outputs.issue_number }}'),
              state: 'closed',
              state_reason: 'completed'
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.extract.outputs.issue_number }}'),
              body: '✅ Deployment complete. RITM ${{ steps.extract.outputs.ritm }} updated in ServiceNow.'
            });
