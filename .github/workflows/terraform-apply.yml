name: Terraform Apply

on:
  push:
    branches: [master]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-*.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    env:
      TF_VERSION: "1.10.0"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TARGET_ENV: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Azure Access Token
        id: az_token
        run: |
          TOKEN=$(az account get-access-token --resource=https://management.azure.com --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          # Also get storage token for backend
          STORAGE_TOKEN=$(az account get-access-token --resource=https://storage.azure.com --query accessToken -o tsv)
          echo "::add-mask::$STORAGE_TOKEN"
          echo "storage_token=$STORAGE_TOKEN" >> $GITHUB_OUTPUT

      - name: Terraform Init
        env:
          ARM_ACCESS_TOKEN: ${{ steps.az_token.outputs.token }}
        run: terraform init -backend-config="key=${{ env.TARGET_ENV }}.tfstate"

      - name: Terraform Plan
        env:
          ARM_ACCESS_TOKEN: ${{ steps.az_token.outputs.token }}
        run: |
          terraform plan \
            -var-file="environments/${{ env.TARGET_ENV }}/terraform.tfvars" \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="vm_admin_password=${{ secrets.VM_ADMIN_PASSWORD }}" \
            -out="tfplan"

      - name: Terraform Apply
        env:
          ARM_ACCESS_TOKEN: ${{ steps.az_token.outputs.token }}
        run: terraform apply -auto-approve "tfplan"
